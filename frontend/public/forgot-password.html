<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ZStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 430px">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Reset your password</h1>
          <p class="small text-muted">
            Enter your account email. If it exists, we will send a reset link.
          </p>
          <form id="form-forgot-password">
            <div class="mb-3">
              <label for="fp-email" class="form-label">Email</label>
              <input
                type="email"
                id="fp-email"
                class="form-control"
                required
                maxlength="254"
                autocomplete="email"
              />
            </div>
            <div id="fp-msg" class="small mb-3 text-muted"></div>
            <button type="submit" class="btn btn-dark w-100">Send reset email</button>
          </form>
          <p class="small mt-3 mb-0 text-center">
            <a href="login.html">Back to sign in</a>
          </p>
        </div>
      </div>
    </div>
    <script src="assets/js/csrf-client.js"></script>
    <script src="assets/js/forgot-password.js"></script>
  </body>
</html>
