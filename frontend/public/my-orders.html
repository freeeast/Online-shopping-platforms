<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders - ZStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">My Orders</h1>
        <a href="index.html" class="btn btn-outline-secondary btn-sm">Back to Store</a>
      </div>
      <p class="text-muted small">
        For unpaid orders, you can pay again, modify quantities, or cancel.
      </p>
      <div id="orders-msg" class="alert alert-info d-none"></div>
      <div class="table-responsive">
        <table class="table table-striped align-middle bg-white shadow-sm">
          <thead>
            <tr>
              <th>Order</th>
              <th>Status</th>
              <th>Pricing</th>
              <th>Items</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="my-orders-full-tbody"></tbody>
        </table>
      </div>
    </main>
    <script src="assets/js/xss-safe.js"></script>
    <script src="assets/js/csrf-client.js"></script>
    <script src="assets/js/my-orders.js"></script>
  </body>
</html>
