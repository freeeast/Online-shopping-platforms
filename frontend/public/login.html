<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - ZStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 420px">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Sign in</h1>
          <p class="small text-muted">
            Admins are sent to the admin panel; other users return to the store.
          </p>
          <form id="form-login">
            <div class="mb-3">
              <label for="login-email" class="form-label">Email</label>
              <input
                type="email"
                id="login-email"
                class="form-control"
                required
                maxlength="254"
                autocomplete="username"
              />
            </div>
            <div class="mb-3">
              <label for="login-password" class="form-label">Password</label>
              <input
                type="password"
                id="login-password"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="current-password"
              />
            </div>
            <div id="login-msg" class="text-danger small mb-3"></div>
            <button type="submit" class="btn btn-dark w-100">Sign in</button>
          </form>
          <p class="small mt-3 mb-0 text-center">
            No account?
            <a href="register.html">Register</a>
            &middot;
            <a href="forgot-password.html">Forgot password</a>
            &middot;
            <a href="change-password.html">Change password</a>
            &middot;
            <a href="index.html">Back to store</a>
          </p>
        </div>
      </div>
    </div>
    <script src="assets/js/csrf-client.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
