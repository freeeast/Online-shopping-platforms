<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - ZStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 430px">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Set a new password</h1>
          <p class="small text-muted">This reset link is single-use and expires in 20 minutes.</p>
          <form id="form-reset-password">
            <div class="mb-3">
              <label for="rp-new" class="form-label">New password</label>
              <input
                type="password"
                id="rp-new"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="new-password"
              />
            </div>
            <div class="mb-3">
              <label for="rp-new2" class="form-label">Confirm new password</label>
              <input
                type="password"
                id="rp-new2"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="new-password"
              />
            </div>
            <div id="rp-msg" class="small mb-3 text-muted"></div>
            <button type="submit" class="btn btn-dark w-100">Reset password</button>
          </form>
          <p class="small mt-3 mb-0 text-center">
            <a href="login.html">Back to sign in</a>
          </p>
        </div>
      </div>
    </div>
    <script src="assets/js/csrf-client.js"></script>
    <script src="assets/js/reset-password.js"></script>
  </body>
</html>
