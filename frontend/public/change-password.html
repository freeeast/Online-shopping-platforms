<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change password - ZStore</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 420px">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Change password</h1>
          <p class="small text-muted">
            You must be signed in. After a successful change you are logged out and must sign in
            again.
          </p>
          <form id="form-change-password">
            <div class="mb-3">
              <label class="form-label" for="cp-old">Current password</label>
              <input
                type="password"
                id="cp-old"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="current-password"
              />
            </div>
            <div class="mb-3">
              <label class="form-label" for="cp-new">New password</label>
              <input
                type="password"
                id="cp-new"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="new-password"
              />
            </div>
            <div class="mb-3">
              <label class="form-label" for="cp-new2">Confirm new password</label>
              <input
                type="password"
                id="cp-new2"
                class="form-control"
                required
                minlength="8"
                maxlength="128"
                autocomplete="new-password"
              />
            </div>
            <div id="cp-msg" class="text-danger small mb-3"></div>
            <button type="submit" class="btn btn-dark w-100">Update password</button>
          </form>
          <p class="small mt-3 mb-0 text-center">
            <a href="index.html">Back to store</a>
            &middot;
            <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>
    </div>
    <script src="assets/js/csrf-client.js"></script>
    <script src="assets/js/change-password.js"></script>
  </body>
</html>
